<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeAI – ATS Keyword Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f7f8fa;
      --surface:      #ffffff;
      --border:       #e5e7eb;
      --border-focus: #4f46e5;
      --text-primary: #111827;
      --text-secondary:#6b7280;
      --text-tertiary: #9ca3af;
      --accent:       #4f46e5;
      --accent-light: #eef2ff;
      --accent-muted: #a5b4fc;
      --green:        #059669;
      --green-light:  #ecfdf5;
      --green-border: #6ee7b7;
      --amber:        #d97706;
      --amber-light:  #fffbeb;
      --amber-border: #fcd34d;
      --red:          #dc2626;
      --red-light:    #fef2f2;
      --red-border:   #fca5a5;
      --radius-sm:    6px;
      --radius-md:    10px;
      --radius-lg:    14px;
      --shadow-sm:    0 1px 2px rgba(0,0,0,.06);
      --shadow-md:    0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg:    0 2px 8px rgba(0,0,0,.08), 0 12px 32px rgba(0,0,0,.07);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    #root { min-height: 100%; display: flex; flex-direction: column; }

    /* ── scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }

    /* ── animations ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    .fade-up  { animation: fadeSlideUp .3s ease both; }
    .spinner  { animation: spin 0.9s linear infinite; }

    /* ── nav ── */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .nav-logomark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #fff;
      font-weight: 800;
      letter-spacing: -.5px;
      flex-shrink: 0;
    }
    .nav-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -.2px;
    }
    .nav-badge {
      margin-left: 8px;
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid #c7d2fe;
      border-radius: 99px;
      padding: 2px 7px;
      letter-spacing: .2px;
    }

    /* ── layout ── */
    .page {
      flex: 1;
      max-width: 1120px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .columns {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
    }

    /* ── left panel ── */
    .left-panel {
      position: sticky;
      top: 72px;
    }
    .left-panel .card { padding: 20px; }

    .panel-title  { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .panel-sub    { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* ── tabs ── */
    .tab-bar {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3px;
      margin: 14px 0;
    }
    .tab-btn {
      flex: 1;
      padding: 7px 12px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: all .15s;
      background: transparent;
      color: var(--text-secondary);
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: var(--shadow-sm);
    }

    /* ── textarea / input ── */
    .jd-textarea, .jd-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      font-size: 13px;
      line-height: 1.65;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--bg);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      resize: vertical;
    }
    .jd-textarea:focus, .jd-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
      background: #fff;
    }
    .jd-textarea::placeholder, .jd-input::placeholder { color: var(--text-tertiary); }

    /* ── note box ── */
    .note-box {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      background: var(--amber-light);
      border: 1px solid var(--amber-border);
      font-size: 12px;
      color: #92400e;
      line-height: 1.6;
    }

    /* ── error box ── */
    .error-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: var(--red-light);
      border: 1px solid var(--red-border);
      font-size: 13px;
      color: var(--red);
      line-height: 1.6;
    }
    .error-box .error-title {
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .error-box .error-detail {
      color: #7f1d1d;
      font-size: 12px;
      white-space: pre-wrap;
    }

    /* ── generate button ── */
    .btn-generate {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      transition: opacity .15s, transform .1s;
      letter-spacing: -.1px;
    }
    .btn-generate:hover:not(:disabled) { opacity: .92; transform: translateY(-1px); }
    .btn-generate:active:not(:disabled) { transform: translateY(0); }
    .btn-generate:disabled { background: var(--accent-muted); cursor: not-allowed; opacity: 1; }
    .btn-generate .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ── how it works ── */
    .how-it-works {
      margin-top: 16px;
      padding: 14px;
      border-radius: var(--radius-md);
      background: var(--accent-light);
      border: 1px solid #c7d2fe;
    }
    .how-it-works .hiw-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .how-it-works .hiw-step {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: #3730a3;
      line-height: 1.5;
      margin-bottom: 5px;
    }
    .hiw-num {
      font-weight: 700;
      font-size: 11px;
      width: 18px;
      height: 18px;
      background: var(--accent);
      color: #fff;
      border-radius: 99px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── right panel empty state ── */
    .empty-state {
      padding: 64px 32px;
      text-align: center;
    }
    .empty-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      border-radius: 16px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }
    .empty-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .empty-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    /* ── inline loading ── */
    .loading-panel {
      padding: 48px 32px;
      text-align: center;
    }
    .loading-ring {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid #e0e7ff;
      border-top-color: var(--accent);
      margin: 0 auto 20px;
    }
    .loading-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .loading-step {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      min-height: 40px;
    }
    .loading-hint {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-top: 20px;
    }
    .loading-dot {
      width: 6px;
      height: 6px;
      border-radius: 99px;
      background: var(--accent-muted);
    }
    .loading-dot.active { background: var(--accent); }

    /* ── stat cards row ── */
    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      padding: 16px;
      text-align: center;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-sub { font-size: 11px; color: var(--text-secondary); }

    /* ── coverage bar ── */
    .cov-bar-wrap {
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .cov-bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .cov-bar-track {
      height: 8px;
      background: #f3f4f6;
      border-radius: 99px;
      overflow: visible;
      position: relative;
    }
    .cov-bar-before {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      border-radius: 99px;
      background: #d1d5db;
      transition: width .8s cubic-bezier(.4,0,.2,1);
    }
    .cov-bar-after {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      border-radius: 99px;
      background: var(--accent);
      transition: width .8s cubic-bezier(.4,0,.2,1) .1s;
    }
    .cov-target-line {
      position: absolute;
      left: 80%;
      top: -4px; bottom: -4px;
      width: 2px;
      background: var(--amber);
      border-radius: 99px;
    }
    .cov-target-label {
      position: absolute;
      top: -18px;
      left: 80%;
      transform: translateX(-50%);
      font-size: 9px;
      font-weight: 700;
      color: var(--amber);
      white-space: nowrap;
    }

    /* ── download button ── */
    .btn-download {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: var(--green);
      transition: opacity .15s, transform .1s;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-download:hover { opacity: .9; transform: translateY(-1px); }
    .btn-download:active { transform: translateY(0); }

    /* ── section header ── */
    .section-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .section-count {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* ── filter pills ── */
    .filter-pills { display: flex; gap: 5px; }
    .filter-pill {
      padding: 4px 11px;
      border-radius: 99px;
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: var(--surface);
      color: var(--text-secondary);
      transition: all .12s;
    }
    .filter-pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── keyword badges ── */
    .kw-gained {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 4px;
      margin-bottom: 5px;
      background: var(--green-light);
      color: #065f46;
      border: 1px solid var(--green-border);
    }
    .kw-present {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      margin-right: 4px;
      margin-bottom: 5px;
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }
    .kw-missing {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      margin-right: 4px;
      margin-bottom: 5px;
      background: var(--red-light);
      color: #b91c1c;
      border: 1px solid var(--red-border);
    }

    /* ── change accordion ── */
    .change-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 8px;
      background: var(--surface);
      transition: box-shadow .15s;
    }
    .change-card:hover { box-shadow: var(--shadow-sm); }
    .change-header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }
    .change-section-tag {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }
    .change-preview {
      flex: 1;
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .change-kw-count {
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      background: var(--green-light);
      border-radius: 99px;
      padding: 2px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .change-chevron {
      color: var(--text-tertiary);
      font-size: 12px;
      flex-shrink: 0;
      transition: transform .15s;
    }
    .change-chevron.open { transform: rotate(180deg); }
    .change-body { padding: 0 14px 14px; }
    .change-injected-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-tertiary);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .change-diff-block {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
    }
    .change-diff-block.removed {
      background: #fff5f5;
      border: 1px solid #fecaca;
    }
    .change-diff-block.added {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }
    .diff-label {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .diff-label.removed { color: #991b1b; }
    .diff-label.added   { color: #065f46; }
    .diff-text {
      font-size: 12.5px;
      line-height: 1.65;
    }
    .diff-text.removed { color: #7f1d1d; }
    .diff-text.added   { color: #14532d; }

    /* ── responsive ── */
    @media (max-width: 800px) {
      .columns { grid-template-columns: 1fr; }
      .left-panel { position: static; }
      .stat-row { grid-template-columns: 1fr 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .stat-row { grid-template-columns: 1fr; }
      .page { padding: 16px 12px 40px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;
// Relative paths — works on localhost AND Vercel without any changes
const API = "";

const LOADING_STEPS = [
  "Extracting ATS keywords from job description…",
  "Embedding resume bullets with OpenAI…",
  "Embedding JD keywords…",
  "Running vector search — assigning keywords to bullets…",
  "Rewriting bullets with GPT-4o keyword injection…",
  "Running verification pass for missing keywords…",
  "Building formatted DOCX…",
];

// ─── icons (inline SVG, no external deps) ───────────────────────────────────

const IconSparkle = () => (
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/>
  </svg>
);

const IconDownload = () => (
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
  </svg>
);

const IconTarget = () => (
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
  </svg>
);

const IconAlert = () => (
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
);

const IconWarning = () => (
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#92400e" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
  </svg>
);

const IconCheck = () => (
  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);

const IconPlus = () => (
  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
);

const IconX = () => (
  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
);

// ─── keyword badge ────────────────────────────────────────────────────────────

function KeywordBadge({ keyword, before, after }) {
  if (after && !before) return (
    <span className="kw-gained" title="Newly injected into resume">
      <IconPlus />{keyword}
    </span>
  );
  if (after) return (
    <span className="kw-present" title="Already present in resume">
      <IconCheck />{keyword}
    </span>
  );
  return (
    <span className="kw-missing" title="Not matched — below similarity threshold">
      <IconX />{keyword}
    </span>
  );
}

// ─── change card ─────────────────────────────────────────────────────────────

function ChangeCard({ change, index, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);
  const kwCount = change.injected_keywords?.length || 0;

  return (
    <div className="change-card">
      <button className="change-header" onClick={() => setOpen(o => !o)}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="change-section-tag">
            {change.section || `Bullet ${index + 1}`}
          </div>
          <div className="change-preview">{change.original}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
          {kwCount > 0 && (
            <span className="change-kw-count">+{kwCount} keywords</span>
          )}
          <span className={`change-chevron${open ? " open" : ""}`}>▼</span>
        </div>
      </button>

      {open && (
        <div className="change-body">
          {kwCount > 0 && (
            <div style={{ marginBottom: 10 }}>
              <div className="change-injected-label">Injected Keywords</div>
              <div>
                {change.injected_keywords.map(kw => (
                  <span key={kw} className="kw-gained"><IconPlus />{kw}</span>
                ))}
              </div>
            </div>
          )}
          <div className="change-diff-block removed">
            <div className="diff-label removed">Before</div>
            <div className="diff-text removed">{change.original}</div>
          </div>
          <div className="change-diff-block added">
            <div className="diff-label added">After</div>
            <div className="diff-text added">{change.rewritten}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── results panel ───────────────────────────────────────────────────────────

function ResultsPanel({ result, onDownload }) {
  const [kwFilter, setKwFilter] = useState("all");
  const {
    keywords_total, keywords_before, keywords_after,
    coverage_before, coverage_after, coverage_gain,
    keyword_diff, changes, rewrites_count,
  } = result;

  const gained = keywords_after - keywords_before;
  const missing = keywords_total - keywords_after;

  const afterColor =
    coverage_after >= 80 ? "var(--green)" :
    coverage_after >= 60 ? "var(--amber)" : "var(--red)";

  const filtered = (keyword_diff || []).filter(k => {
    if (kwFilter === "gained")  return k.gained;
    if (kwFilter === "missing") return !k.after;
    return true;
  });

  return (
    <div className="fade-up">

      {/* Stat cards */}
      <div className="stat-row" style={{ marginBottom: 12 }}>
        <div className="card stat-card">
          <div className="stat-label">Before</div>
          <div className="stat-value" style={{ color: "var(--text-tertiary)" }}>{coverage_before}%</div>
          <div className="stat-sub">{keywords_before} / {keywords_total} keywords</div>
        </div>
        <div className="card stat-card">
          <div className="stat-label">After</div>
          <div className="stat-value" style={{ color: afterColor }}>{coverage_after}%</div>
          <div className="stat-sub">{keywords_after} / {keywords_total} keywords</div>
        </div>
        <div className="card stat-card">
          <div className="stat-label">Gained</div>
          <div className="stat-value" style={{ color: "var(--accent)" }}>+{coverage_gain}%</div>
          <div className="stat-sub">{gained} new keywords</div>
        </div>
      </div>

      {/* Coverage progress bar */}
      <div className="card cov-bar-wrap" style={{ marginBottom: 12 }}>
        <div className="cov-bar-header">
          <span>ATS Keyword Coverage</span>
          <span style={{ fontWeight: 600, color: afterColor }}>{coverage_after}% matched</span>
        </div>
        <div className="cov-bar-track" style={{ marginTop: 20 }}>
          <span className="cov-target-label">Target 80%</span>
          <div className="cov-bar-before" style={{ width: `${Math.min(coverage_before, 100)}%` }} />
          <div className="cov-bar-after"  style={{ width: `${Math.min(coverage_after,  100)}%` }} />
          <div className="cov-target-line" />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 10, color: "var(--text-tertiary)" }}>
          <span>0%</span><span>50%</span><span>100%</span>
        </div>
      </div>

      {/* Download */}
      <button className="btn-download" onClick={onDownload}>
        <IconDownload />
        Download Optimized Resume
        <span style={{ opacity: .75, fontWeight: 500 }}>· {rewrites_count} bullets rewritten</span>
      </button>

      {/* Keyword breakdown */}
      <div className="card" style={{ padding: "16px 18px", marginBottom: 16 }}>
        <div className="section-hdr">
          <div>
            <span className="section-title">Keywords</span>
            <span className="section-count" style={{ marginLeft: 8 }}>
              {keywords_total} total
              &nbsp;·&nbsp;<span style={{ color: "var(--green)" }}>{keywords_after} matched</span>
              &nbsp;·&nbsp;<span style={{ color: "var(--red)" }}>{missing} missing</span>
            </span>
          </div>
          <div className="filter-pills">
            {[
              ["all",     "All"],
              ["gained",  `+${gained} gained`],
              ["missing", `${missing} missing`],
            ].map(([v, l]) => (
              <button
                key={v}
                className={`filter-pill${kwFilter === v ? " active" : ""}`}
                onClick={() => setKwFilter(v)}
              >{l}</button>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", flexWrap: "wrap" }}>
          {filtered.map(k => (
            <KeywordBadge key={k.keyword} keyword={k.keyword} before={k.before} after={k.after} />
          ))}
          {filtered.length === 0 && (
            <div style={{ fontSize: 12, color: "var(--text-tertiary)", padding: "6px 0" }}>
              No keywords in this filter
            </div>
          )}
        </div>
      </div>

      {/* Rewritten bullets */}
      {changes?.length > 0 && (
        <div>
          <div className="section-hdr">
            <span className="section-title">Rewritten Bullets</span>
            <span className="section-count">{changes.length} changes</span>
          </div>
          {changes.map((c, i) => (
            <ChangeCard key={i} change={c} index={i} defaultOpen={i < 2} />
          ))}
        </div>
      )}
    </div>
  );
}

// ─── inline loading ──────────────────────────────────────────────────────────

function LoadingPanel({ stepIdx }) {
  return (
    <div className="card loading-panel fade-up">
      <div className="loading-ring spinner" />
      <div className="loading-label">Optimizing Your Resume</div>
      <div className="loading-step">{LOADING_STEPS[stepIdx]}</div>
      <div className="loading-hint">This takes about 45–60 seconds</div>
      <div className="loading-dots">
        {LOADING_STEPS.map((_, i) => (
          <div key={i} className={`loading-dot${i === stepIdx ? " active" : ""}`} />
        ))}
      </div>
    </div>
  );
}

// ─── app ─────────────────────────────────────────────────────────────────────

function App() {
  const [mode,    setMode]    = useState("paste");
  const [jdText,  setJdText]  = useState("");
  const [jdUrl,   setJdUrl]   = useState("");
  const [loading, setLoading] = useState(false);
  const [stepIdx, setStepIdx] = useState(0);
  const [error,   setError]   = useState(null);
  const [result,  setResult]  = useState(null);
  const timerRef = useRef(null);

  const startSteps = () => {
    let i = 0; setStepIdx(0);
    timerRef.current = setInterval(() => {
      i = Math.min(i + 1, LOADING_STEPS.length - 1);
      setStepIdx(i);
    }, 7500);
  };
  const stopSteps = () => {
    if (timerRef.current) clearInterval(timerRef.current);
  };

  const handleGenerate = async () => {
    if (mode === "paste" && !jdText.trim()) {
      setError("Please paste the job description text.");
      return;
    }
    if (mode === "url" && !jdUrl.trim()) {
      setError("Please enter the job posting URL.");
      return;
    }
    setError(null); setResult(null); setLoading(true); startSteps();
    try {
      const body = mode === "url"
        ? { jd_url: jdUrl.trim(),  jd_text: "" }
        : { jd_text: jdText.trim(), jd_url: "" };
      const res = await fetch(`${API}/api/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const detail = await res.json().then(d => d.detail).catch(() => "Unknown error");
        throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
      }
      setResult(await res.json());
    } catch (err) {
      setError(err.message || "Something went wrong. Is the API server running?");
    } finally {
      stopSteps(); setLoading(false);
    }
  };

  const errorLines = (error || "").split("\n").filter(Boolean);

  return (
    <div style={{ minHeight: "100vh", background: "var(--bg)" }}>

      {/* Nav */}
      <nav className="nav">
        <div className="nav-logo">
          <div className="nav-logomark">R</div>
          <span className="nav-title">ResumeAI</span>
          <span className="nav-badge">ATS Optimizer</span>
        </div>
      </nav>

      <div className="page">
        <div className="columns">

          {/* ── Left: input panel ── */}
          <div className="left-panel">
            <div className="card" style={{ padding: "20px" }}>
              <div className="panel-title">Job Description</div>
              <div className="panel-sub">Paste text or enter a job posting URL</div>

              {/* Mode tabs */}
              <div className="tab-bar">
                {[["paste", "Paste Text"], ["url", "URL"]].map(([v, l]) => (
                  <button
                    key={v}
                    className={`tab-btn${mode === v ? " active" : ""}`}
                    onClick={() => setMode(v)}
                  >{l}</button>
                ))}
              </div>

              {mode === "paste" ? (
                <textarea
                  className="jd-textarea"
                  rows={15}
                  value={jdText}
                  onChange={e => setJdText(e.target.value)}
                  placeholder={"Paste the full job description here…\n\nSoftware Engineer 4\n\nQualifications:\n• Experience with microservices…\n• Proficiency in Python / Go…"}
                />
              ) : (
                <div>
                  <input
                    className="jd-input"
                    type="url"
                    value={jdUrl}
                    onChange={e => setJdUrl(e.target.value)}
                    placeholder="https://jobs.example.com/senior-engineer"
                  />
                  <div className="note-box">
                    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontWeight: 700, marginBottom: 2 }}>
                      <IconWarning /> Note
                    </span>
                    <br />
                    JavaScript-rendered job boards are supported now.
                    If a plain fetch comes back empty, the app will retry with a browser-rendered fetch automatically.
                  </div>
                </div>
              )}

              {/* Error */}
              {error && (
                <div className="error-box">
                  <div className="error-title">
                    <IconAlert /> {errorLines[0]}
                  </div>
                  {errorLines.length > 1 && (
                    <div className="error-detail">{errorLines.slice(1).join("\n").trim()}</div>
                  )}
                </div>
              )}

              {/* Generate button */}
              <button className="btn-generate" onClick={handleGenerate} disabled={loading}>
                <div className="btn-inner">
                  {loading ? (
                    <>
                      <div style={{ width: 16, height: 16, borderRadius: "50%", border: "2.5px solid rgba(255,255,255,.4)", borderTopColor: "#fff" }} className="spinner" />
                      Optimizing…
                    </>
                  ) : (
                    <>
                      <IconSparkle />
                      Generate Optimized Resume
                    </>
                  )}
                </div>
              </button>

              {/* How it works */}
              <div className="how-it-works">
                <div className="hiw-title">How it works</div>
                {[
                  "Extracts 25–50 ATS keywords from the JD",
                  "Vector-searches each keyword → best-matching bullet",
                  "GPT injects keywords verbatim into bullets",
                  "Targets 80–90% ATS keyword coverage",
                ].map((step, i) => (
                  <div key={i} className="hiw-step">
                    <div className="hiw-num">{i + 1}</div>
                    <span>{step}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ── Right: results panel ── */}
          <div>
            {!result && !loading && (
              <div className="card empty-state">
                <div className="empty-icon"><IconTarget /></div>
                <div className="empty-title">Ready to optimize</div>
                <div className="empty-desc">
                  Paste a job description and click Generate.<br />
                  The tool injects ATS keywords from the JD directly<br />
                  into your resume using vector search + GPT-4o.
                </div>
              </div>
            )}
            {loading && <LoadingPanel stepIdx={stepIdx} />}
            {result && (
              <ResultsPanel
                result={result}
                onDownload={() => result?.filename && window.open(`${API}/api/download/${result.filename}`)}
              />
            )}
          </div>

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
